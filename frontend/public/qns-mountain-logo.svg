<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle / HUD frame -->
  <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.3"/>
  <circle cx="50" cy="50" r="48" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>

  <!-- Outer ticks -->
  <line x1="50" y1="2" x2="50" y2="6" stroke="#2563EB" stroke-width="2"/>
  <line x1="50" y1="94" x2="50" y2="98" stroke="#2563EB" stroke-width="2"/>
  <line x1="2" y1="50" x2="6" y2="50" stroke="#2563EB" stroke-width="2"/>
  <line x1="94" y1="50" x2="98" y2="50" stroke="#2563EB" stroke-width="2"/>

  <!-- Mountain Peak -->
  <!-- Base mountain contour -->
  <polygon points="50,22 80,78 20,78" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner mountain ridges -->
  <line x1="50" y1="22" x2="50" y2="78" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  <line x1="50" y1="55" x2="20" y2="78" stroke="currentColor" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="80" y2="78" stroke="currentColor" stroke-width="1.5"/>
  <line x1="50" y1="22" x2="35" y2="78" stroke="currentColor" stroke-width="1" stroke-dasharray="1 1" opacity="0.5"/>
  <line x1="50" y1="22" x2="65" y2="78" stroke="currentColor" stroke-width="1" stroke-dasharray="1 1" opacity="0.5"/>

  <!-- Snow Cap (Electric Blue Highlight) -->
  <polygon points="50,22 62.5,45 50,38 37.5,45" fill="#2563EB" stroke="#2563EB" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>
</svg>
